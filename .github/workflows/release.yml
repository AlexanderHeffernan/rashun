name: Build & Release

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  determine-version:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: bash
        run: |
          PLIST_VERSION=$(grep -A1 'CFBundleShortVersionString' Info.plist | tail -1 | sed -E 's/.*<string>([^<]+)<\/string>.*/\1/')
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)

          if [ -z "$LATEST_TAG" ]; then
            VERSION="$PLIST_VERSION"
          else
            LATEST_VERSION="${LATEST_TAG#v}"
            HIGHER=$(printf '%s\n%s' "$PLIST_VERSION" "$LATEST_VERSION" | sort -V | tail -1)
            if [ "$PLIST_VERSION" != "$LATEST_VERSION" ] && [ "$HIGHER" = "$PLIST_VERSION" ]; then
              VERSION="$PLIST_VERSION"
            else
              IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
              PATCH=$((PATCH + 1))
              VERSION="$MAJOR.$MINOR.$PATCH"
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-artifacts:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    needs: determine-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: rashun-macos-app
            artifact_path: Rashun.zip
          - os: ubuntu-latest
            artifact_name: rashun-cli-linux-x86_64
            artifact_path: rashun-cli-linux-x86_64.tar.gz
            cli_package_name: rashun-cli-linux-x86_64.tar.gz
          - os: ubuntu-24.04-arm
            artifact_name: rashun-cli-linux-aarch64
            artifact_path: rashun-cli-linux-aarch64.tar.gz
            cli_package_name: rashun-cli-linux-aarch64.tar.gz
          - os: windows-latest
            artifact_name: rashun-cli-windows
            artifact_path: rashun-cli-windows.zip

    runs-on: ${{ matrix.os }}
    env:
      RASHUN_RELEASE_VERSION: ${{ needs.determine-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stamp version into Info.plist
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sed -i '' "s|<string>1.0.0</string>|<string>${RASHUN_RELEASE_VERSION}</string>|" Info.plist

      - name: Stamp version into GeneratedVersion.swift
        shell: bash
        run: |
          printf '// Auto-generated by CI — do not edit manually.\npublic let rashunVersion: String = "%s"\n' "$RASHUN_RELEASE_VERSION" > Sources/RashunCore/GeneratedVersion.swift

      - name: Setup Swift (macOS/Linux x64)
        if: runner.os != 'Windows' && !(runner.os == 'Linux' && runner.arch == 'ARM64')
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2.4"

      - name: Use preinstalled Swift (Linux ARM64)
        if: runner.os == 'Linux' && runner.arch == 'ARM64'
        shell: bash
        run: |
          set -euo pipefail
          swift --version
          SWIFT_VERSION="$(swift --version | awk '/Swift version/{print $3}')"
          if [ -z "$SWIFT_VERSION" ]; then
            echo "Unable to detect Swift version on Linux ARM64 runner" >&2
            exit 1
          fi

          if [ "$(printf '%s\n' "6.2.0" "$SWIFT_VERSION" | sort -V | head -1)" != "6.2.0" ]; then
            echo "Swift $SWIFT_VERSION is too old; requires Swift >= 6.2.0" >&2
            exit 1
          fi

      - name: Setup Swift (Windows)
        if: runner.os == 'Windows'
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.2-release
          swift-build: 6.2-RELEASE

      - name: Build macOS app and CLI
        if: runner.os == 'macOS'
        run: ./build.sh

      - name: Smoke test app launch
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          BEFORE_LIST="$(mktemp)"
          AFTER_LIST="$(mktemp)"
          ls -1 ~/Library/Logs/DiagnosticReports/Rashun-*.ips 2>/dev/null | sort > "$BEFORE_LIST" || true

          ./Rashun.app/Contents/MacOS/Rashun >/tmp/rashun-smoke.stdout 2>/tmp/rashun-smoke.stderr &
          APP_PID=$!

          sleep 6

          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "Rashun exited during smoke test."
            echo "--- stdout ---"
            cat /tmp/rashun-smoke.stdout || true
            echo "--- stderr ---"
            cat /tmp/rashun-smoke.stderr || true

            ls -1 ~/Library/Logs/DiagnosticReports/Rashun-*.ips 2>/dev/null | sort > "$AFTER_LIST" || true
            NEW_REPORTS="$(comm -13 "$BEFORE_LIST" "$AFTER_LIST" || true)"
            if [ -n "$NEW_REPORTS" ]; then
              echo "--- New Rashun crash report(s) ---"
              echo "$NEW_REPORTS"
              LATEST_REPORT="$(echo "$NEW_REPORTS" | tail -1)"
              sed -n '1,220p' "$LATEST_REPORT" || true
            fi

            exit 1
          fi

          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" 2>/dev/null || true

      - name: Package macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: zip -r Rashun.zip Rashun.app

      - name: Package macOS CLI
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          cp .build/arm64-apple-macosx/release/RashunCLI rashun
          chmod +x rashun
          tar -czf rashun-cli-macos.tar.gz rashun

      - name: Build CLI (Linux/Windows)
        if: runner.os != 'macOS'
        run: swift build -c release --product RashunCLI

      - name: Package Linux CLI
        if: runner.os == 'Linux'
        shell: bash
        env:
          CLI_PACKAGE_NAME: ${{ matrix.cli_package_name }}
        run: |
          set -euo pipefail
          cp .build/release/RashunCLI rashun
          chmod +x rashun

          help_output="$(./rashun --help 2>&1 || true)"
          if [ -z "$help_output" ]; then
            echo "Linux CLI smoke test failed: rashun --help returned empty output" >&2
            exit 1
          fi

          tar -czf "$CLI_PACKAGE_NAME" rashun

      - name: Package Windows CLI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageDir = "rashun-windows-cli"
          Remove-Item -Recurse -Force $packageDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $packageDir | Out-Null

          Copy-Item ".build\release\RashunCLI.exe" (Join-Path $packageDir "rashun.exe") -Force

          $targetInfo = swift -print-target-info | ConvertFrom-Json
          $runtimePath = $targetInfo.paths.runtimeLibraryPaths[0]
          Get-ChildItem -Path $runtimePath -Filter "*.dll" -File |
            ForEach-Object { Copy-Item $_.FullName (Join-Path $packageDir $_.Name) -Force }

          Get-ChildItem -Path ".build\release" -Filter "*.dll" -File -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName (Join-Path $packageDir $_.Name) -Force }

          $helpOutput = & (Join-Path $packageDir "rashun.exe") --help 2>&1 | Out-String
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($helpOutput)) {
            throw "Windows CLI smoke test failed: rashun --help"
          }

          Compress-Archive -Path "$packageDir\*" -DestinationPath "rashun-cli-windows.zip" -Force

      - name: Upload primary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

      - name: Upload macOS CLI artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: rashun-cli-macos
          path: rashun-cli-macos.tar.gz

  publish-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    needs: [determine-version, build-artifacts]
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.determine-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS app artifact
        uses: actions/download-artifact@v4
        with:
          name: rashun-macos-app

      - name: Download macOS CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: rashun-cli-macos

      - name: Download Linux CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: rashun-cli-linux-x86_64

      - name: Download Linux ARM64 CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: rashun-cli-linux-aarch64

      - name: Restore legacy Linux artifact name
        shell: bash
        run: cp rashun-cli-linux-x86_64.tar.gz rashun-cli-linux.tar.gz

      - name: Download Windows CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: rashun-cli-windows

      - name: Clean up old latest tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --cleanup-tag --yes 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "v${RELEASE_VERSION}" \
            Rashun.zip \
            rashun-cli-macos.tar.gz \
            rashun-cli-linux-x86_64.tar.gz \
            rashun-cli-linux-aarch64.tar.gz \
            rashun-cli-linux.tar.gz \
            rashun-cli-windows.zip \
            --title "v${RELEASE_VERSION}" \
            --latest \
            --notes "## v${RELEASE_VERSION}

          **macOS app install:**
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/alexanderheffernan/rashun/main/install.sh | bash
          \`\`\`

          **CLI artifacts:**
          - macOS: \`rashun-cli-macos.tar.gz\`
          - Linux x86_64: \`rashun-cli-linux-x86_64.tar.gz\`
          - Linux aarch64/arm64: \`rashun-cli-linux-aarch64.tar.gz\`
          - Linux (legacy x86_64 name): \`rashun-cli-linux.tar.gz\`
          - Windows: \`rashun-cli-windows.zip\`
          "
