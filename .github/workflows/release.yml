name: Build & Release

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # Read base version from Info.plist
          PLIST_VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" Info.plist)

          # Get the latest release tag (if any)
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)

          if [ -z "$LATEST_TAG" ]; then
            # No previous release — use the plist version as-is
            VERSION="$PLIST_VERSION"
          else
            LATEST_VERSION="${LATEST_TAG#v}"
            # Compare plist version to latest tag
            # If plist is higher (manual bump), use it; otherwise auto-bump patch
            HIGHER=$(printf '%s\n%s' "$PLIST_VERSION" "$LATEST_VERSION" | sort -V | tail -1)
            if [ "$PLIST_VERSION" != "$LATEST_VERSION" ] && [ "$HIGHER" = "$PLIST_VERSION" ]; then
              # Manual bump in Info.plist takes priority
              VERSION="$PLIST_VERSION"
            else
              # Auto-bump patch from the latest tag
              IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
              PATCH=$((PATCH + 1))
              VERSION="$MAJOR.$MINOR.$PATCH"
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Stamp version into Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set CFBundleShortVersionString ${{ steps.version.outputs.version }}" Info.plist

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2.4"

      - name: Build app
        run: ./build.sh

      - name: Smoke test app launch
        run: |
          set -euo pipefail

          BEFORE_LIST="$(mktemp)"
          AFTER_LIST="$(mktemp)"
          ls -1 ~/Library/Logs/DiagnosticReports/Rashun-*.ips 2>/dev/null | sort > "$BEFORE_LIST" || true

          ./Rashun.app/Contents/MacOS/Rashun >/tmp/rashun-smoke.stdout 2>/tmp/rashun-smoke.stderr &
          APP_PID=$!

          sleep 6

          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "Rashun exited during smoke test."
            echo "--- stdout ---"
            cat /tmp/rashun-smoke.stdout || true
            echo "--- stderr ---"
            cat /tmp/rashun-smoke.stderr || true

            ls -1 ~/Library/Logs/DiagnosticReports/Rashun-*.ips 2>/dev/null | sort > "$AFTER_LIST" || true
            NEW_REPORTS="$(comm -13 "$BEFORE_LIST" "$AFTER_LIST" || true)"
            if [ -n "$NEW_REPORTS" ]; then
              echo "--- New Rashun crash report(s) ---"
              echo "$NEW_REPORTS"
              LATEST_REPORT="$(echo "$NEW_REPORTS" | tail -1)"
              sed -n '1,220p' "$LATEST_REPORT" || true
            fi

            exit 1
          fi

          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" 2>/dev/null || true

      - name: Zip app bundle
        run: zip -r Rashun.zip Rashun.app

      - name: Clean up old latest tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --cleanup-tag --yes 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" Rashun.zip \
            --title "v${{ steps.version.outputs.version }}" \
            --latest \
            --notes "## v${{ steps.version.outputs.version }}

          **Install with one command:**
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/alexanderheffernan/rashun/main/install.sh | bash
          \`\`\`"
