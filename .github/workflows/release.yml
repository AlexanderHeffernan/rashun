name: Build & Release

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2.4"

      - name: Build app
        run: ./build.sh

      - name: Zip app bundle
        run: zip -r Rashun.zip Rashun.app

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --cleanup-tag --yes 2>/dev/null || true

      - name: Create latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest Rashun.zip \
            --title "Latest Build" \
            --notes "Latest build from the \`main\` branch.

          **Install with one command:**
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/alexanderheffernan/rashun/main/install.sh | bash
          \`\`\`"
