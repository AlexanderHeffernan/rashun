name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift 6.2
        uses: swiftlang/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Run tests
        run: swift test
