name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli-core-cross-platform:
    name: CLI/Core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift (macOS/Linux)
        if: runner.os != 'Windows'
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2.4"

      - name: Setup Swift (Windows)
        if: runner.os == 'Windows'
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: 6.2.4
          swift-build: release/6.2

      - name: Run tests
        run: swift test

      - name: Build CLI
        run: swift build --product RashunCLI

      - name: CLI smoke test (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          swift run RashunCLI --help
          swift run RashunCLI

      - name: CLI smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          swift run RashunCLI --help
          swift run RashunCLI

  macos-app:
    name: macOS App
    runs-on: macos-latest
    needs: cli-core-cross-platform

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2.4"

      - name: Generate source list
        run: ./build.sh --test

      - name: Run tests
        run: swift test

      - name: Build app bundle
        run: ./build.sh

      - name: Smoke test app launch
        shell: bash
        run: |
          set -euo pipefail

          BEFORE_LIST="$(mktemp)"
          AFTER_LIST="$(mktemp)"
          ls -1 ~/Library/Logs/DiagnosticReports/Rashun-*.ips 2>/dev/null | sort > "$BEFORE_LIST" || true

          ./Rashun.app/Contents/MacOS/Rashun >/tmp/rashun-smoke.stdout 2>/tmp/rashun-smoke.stderr &
          APP_PID=$!

          sleep 6

          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "Rashun exited during smoke test."
            echo "--- stdout ---"
            cat /tmp/rashun-smoke.stdout || true
            echo "--- stderr ---"
            cat /tmp/rashun-smoke.stderr || true

            ls -1 ~/Library/Logs/DiagnosticReports/Rashun-*.ips 2>/dev/null | sort > "$AFTER_LIST" || true
            NEW_REPORTS="$(comm -13 "$BEFORE_LIST" "$AFTER_LIST" || true)"
            if [ -n "$NEW_REPORTS" ]; then
              echo "--- New Rashun crash report(s) ---"
              echo "$NEW_REPORTS"
              LATEST_REPORT="$(echo "$NEW_REPORTS" | tail -1)"
              sed -n '1,220p' "$LATEST_REPORT" || true
            fi

            exit 1
          fi

          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" 2>/dev/null || true
